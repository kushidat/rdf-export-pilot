name: Convert RDF sample

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run converter
        run: |
          python scripts/convert_nt.py
          ls -la output
